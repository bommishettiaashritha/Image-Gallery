<!DOCTYPE html>
<html lang="en">
<head>
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Nature & City Gallery</h1>

<div class="filter-buttons">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">
  <!-- Nature Images -->
  <img src="Nature.png" class="nature" onclick="openLightbox(this.src)">
  <img src="Nature2.png" class="nature" onclick="openLightbox(this.src)">

  <!-- City Images -->
  <img src="City.png" class="city" onclick="openLightbox(this.src)">
  <img src="City2.png" class="city" onclick="openLightbox(this.src)">
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
